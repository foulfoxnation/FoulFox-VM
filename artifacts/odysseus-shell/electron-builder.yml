appId: com.odysseus.unity
productName: "Windows Odysseus + Unity"

directories:
  output: dist-electron

files:
  - dist/public/**/*
  - electron/main.cjs
  - package.json

extraResources:
  - from: "../api-server/dist"
    to: "api-server/dist"
    filter:
      - "**/*.mjs"
      - "**/*.mjs.map"
  # node-pty is externalized by esbuild (native .node binary); must be present alongside dist/
  - from: "../api-server/node_modules/node-pty"
    to: "api-server/node_modules/node-pty"
  # Include the full Odysseus service directory.
  # Exclude only dev/build artifacts and caches; keep static/, src/, core/, routes/,
  # config/, services/, scripts/, docs/ etc. so the UI renders correctly.
  - from: "../../artifacts/odysseus-service"
    to: "odysseus-service"
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.git/**"
      - "!**/node_modules/**"
      - "!**/docker/**"
      - "!**/Dockerfile*"
      - "!**/.env*"
      - "!**/dist/**"
      - "!**/.pytest_cache/**"
      - "!**/.mypy_cache/**"
      - "!**/tests/**"
      - "!**/*.egg-info/**"

# Unpack native addons from asar so node can dlopen() them
asarUnpack:
  - "resources/api-server/node_modules/node-pty/**"

linux:
  target:
    - AppImage
    - deb
  category: Development

win:
  target:
    - nsis

mac:
  target:
    - dmg
  category: public.app-category.developer-tools

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

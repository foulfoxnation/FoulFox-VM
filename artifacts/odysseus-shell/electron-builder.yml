appId: com.odysseus.unity
productName: "Windows Odysseus + Unity"

directories:
  output: dist-electron
  # No custom buildResources — we use default icons or none; CI can add them later

files:
  - dist/public/**/*
  - electron/main.cjs
  - package.json

# The API server dist and Odysseus service are bundled as extraResources
# so Electron can spawn them at runtime from the installed app path
extraResources:
  - from: "../api-server/dist"
    to: "api-server/dist"
    filter:
      - "**/*.mjs"
      - "**/*.mjs.map"
  # node-pty is externalized by esbuild (native .node binary) so it must be
  # present alongside the bundled dist at runtime.
  - from: "../api-server/node_modules/node-pty"
    to: "api-server/node_modules/node-pty"
  - from: "../../artifacts/odysseus-service"
    to: "odysseus-service"
    filter:
      - "**/*.py"
      - "start.sh"
      - "requirements.txt"
      - "data/.gitkeep"
      - "!**/__pycache__/**"
      - "!**/.git/**"

# Unpack native addons from the asar archive so node can dlopen() them
asarUnpack:
  - "resources/api-server/node_modules/node-pty/**"

linux:
  target:
    - AppImage
    - deb
  category: Development

win:
  target:
    - nsis

mac:
  target:
    - dmg
  category: public.app-category.developer-tools

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

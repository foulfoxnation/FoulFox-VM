kind = "web"
previewPath = "/"
title = "Windows Odysseus + Unity"
version = "1.0.0"
id = "artifacts/odysseus-shell"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26142

[services.development]
run = "pnpm --filter @workspace/odysseus-shell run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/odysseus-shell", "run", "build" ]
publicDir = "artifacts/odysseus-shell/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26142"
BASE_PATH = "/"

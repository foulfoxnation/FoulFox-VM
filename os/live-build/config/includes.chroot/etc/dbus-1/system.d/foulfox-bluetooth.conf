<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  FoulFox OS — let the appliance user drive BlueZ over the system bus.

  The shell's Bluetooth panel runs `bluetoothctl` from the api-server, which runs
  as the `foulfox` system user (no graphical logind session). BlueZ's default
  D-Bus policy only grants root and at-console users access to org.bluez, so
  without this an unprivileged `bluetoothctl power on` / scan / pair would be
  denied. Grant the foulfox user the access it needs to manage adapters and
  devices (power, discovery, pairing, connect, trust, remove).
-->
<busconfig>
  <policy user="foulfox">
    <allow send_destination="org.bluez"/>
    <allow send_destination="org.bluez" send_interface="org.bluez.Adapter1"/>
    <allow send_destination="org.bluez" send_interface="org.bluez.Device1"/>
    <allow send_destination="org.bluez" send_interface="org.bluez.AgentManager1"/>
    <allow send_destination="org.bluez" send_interface="org.bluez.Agent1"/>
    <allow send_destination="org.bluez" send_interface="org.freedesktop.DBus.ObjectManager"/>
    <allow send_destination="org.bluez" send_interface="org.freedesktop.DBus.Properties"/>
  </policy>
</busconfig>

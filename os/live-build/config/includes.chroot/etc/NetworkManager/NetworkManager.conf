# FoulFox OS — NetworkManager configuration.
#
# Make NetworkManager manage EVERY interface (wired + wireless) so plug-and-play
# networking works out of the box: plug an ethernet cable and it DHCPs
# automatically; the shell's Devices > Network panel drives wifi via nmcli.
#
# Debian's stock NetworkManager.conf sets `[ifupdown] managed=false`, which makes
# NM ignore any interface listed in /etc/network/interfaces. The live image has
# no static interface config, but we force managed=true so nothing is left
# unmanaged regardless of what live-config writes at boot.
[main]
plugins=ifupdown,keyfile

[ifupdown]
managed=true

[device]
# Keep a stable MAC for wifi so saved networks reconnect reliably on a kiosk.
wifi.scan-rand-mac-address=no
